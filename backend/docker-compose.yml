services:
  db:
    image: postgres:16-alpine
    container_name: pait-db
    environment:
      POSTGRES_USER: pait
      POSTGRES_PASSWORD: pait
      POSTGRES_DB: pait
    ports:
      - "5432:5432"
    volumes:
      - pait_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pait -d pait"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pait_pg_data:
